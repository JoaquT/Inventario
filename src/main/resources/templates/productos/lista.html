<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario - Lista de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h2 class="mb-0">Gestión de Inventario</h2>
            <a th:href="@{/productos/nuevo}" class="btn btn-light fw-bold">+ Agregar Producto</a>
        </div>
        <div class="card-body">
            <form th:action="@{/productos}" method="get" class="row g-2 mb-4">
        <div class="col-md-8 col-sm-12">
            <div class="input-group">
                <span class="input-group-text bg-white text-muted">🔍</span>
                <input type="text" 
                       name="buscar" 
                       th:value="${buscar}" 
                       class="form-control" 
                       placeholder="Buscar por código, nombre o descripción..." />
            </div>
        </div>
        <div class="col-md-4 col-sm-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary w-100">Buscar</button>
            <a th:if="${buscar != null}" th:href="@{/productos}" class="btn btn-outline-secondary">Limpiar</a>
        </div>
    </form>

    <table class="table table-hover table-bordered">
        <tbody>
            <tr th:each="prod : ${productos}">
                </tr>
            <tr th:if="${#lists.isEmpty(productos)}">
                <td colspan="6" class="text-center text-muted p-4">
                    <span th:if="${buscar == null}">No hay productos registrados en el inventario.</span>
                    <span th:if="${buscar != null}">No se encontraron productos que coincidan con "<strong><span th:text="${buscar}"></span></strong>".</span>
                </td>
            </tr>
        </tbody>
    </table>
            <table class="table table-hover table-bordered mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>Código</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Stock</th>
                        <th>Precio</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="prod : ${productos}">
                        <td th:text="${prod.codigo}" class="fw-bold text-secondary"></td>
                        <td th:text="${prod.nombre}"></td>
                        <td th:text="${prod.descripcion}"></td>
                        <td th:text="${prod.stock}" th:classappend="${prod.stock < 5} ? 'text-danger fw-bold' : ''"></td>
                        <td th:text="'$' + ${prod.precio}"></td>
                        <td>
                            <a th:href="@{/productos/editar/{cod}(cod=${prod.codigo})}" class="btn btn-warning btn-sm">Editar</a>
                            <a th:href="@{/productos/eliminar/{cod}(cod=${prod.codigo})}" 
                               class="btn btn-danger btn-sm" 
                               onclick="return confirm('¿Estás seguro de eliminar este producto?')">Eliminar</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(productos)}">
                        <td colspan="6" class="text-center text-muted">No hay productos registrados en el inventario.</td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>
</div>

</body>
</html>
