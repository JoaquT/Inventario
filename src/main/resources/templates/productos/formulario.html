<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario - Formulario de Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <h3 class="mb-0" th:text="${producto.id != null} ? 'Editar Producto' : 'Nuevo Producto'"></h3>
        </div>
        <div class="card-body">
    <form th:action="@{/productos/guardar}" th:object="${producto}" method="post">
        
        <input type="hidden" th:field="*{id}" />

        <div class="mb-4 p-3 border rounded bg-light">
            <label for="codigo" class="form-label fw-bold">Identificador del Producto</label>
            <input type="text" 
                   id="codigo" 
                   th:field="*{codigo}" 
                   class="form-control form-control-lg" 
                   th:readonly="${producto.id != null}" />
            <div class="form-text" th:if="${producto.id == null}">
                <strong>Opcional:</strong> Déjalo vacío y el sistema generará uno
            </div>
        </div>

        <div class="mb-3">
            <label for="nombre" class="form-label fw-bold">Nombre del Producto</label>
            <input type="text" id="nombre" th:field="*{nombre}" class="form-control" required />
        </div>

        <div class="mb-3">
            <label for="descripcion" class="form-label">Descripción / Notas</label>
            <textarea id="descripcion" th:field="*{descripcion}" class="form-control" rows="2"></textarea>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="stock" class="form-label fw-bold">Stock Inicial</label>
                <input type="number" id="stock" th:field="*{stock}" class="form-control" min="0" required />
            </div>
            <div class="col-md-6 mb-3">
                <label for="precio" class="form-label fw-bold">Precio ($)</label>
                <input type="number" step="0.01" id="precio" th:field="*{precio}" class="form-control" min="0" required />
            </div>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
            <a th:href="@{/productos}" class="btn btn-outline-secondary">Volver al listado</a>
            <button type="submit" class="btn btn-primary px-4">
                <span th:text="${producto.id != null} ? 'Actualizar Producto' : 'Registrar Producto'"></span>
            </button>
        </div>
    </form>
</div>
    </div>
</div>

</body>
</html>
